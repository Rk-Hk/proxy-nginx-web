services:
  app-pokemon:
    build:
      context: ./pokemon-random-ng
      dockerfile: Dockerfile
    container_name: angular-poke-container
    restart: always

  app-carousel:
    build: 
      context: ./image-carousel-web
      dockerfile: Dockerfile
    container_name: react-carousel-container
    restart: always

  # El Proxy que une todo
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-pokemon
      - app-carousel
    restart: always
