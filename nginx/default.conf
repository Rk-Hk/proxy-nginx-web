server {
    listen 80;

    # Agregamos el / al final de la ruta
    location /pokemon/ {
        proxy_pass http://app-pokemon:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agregamos el / al final de la ruta
    location /carousel/ {
        proxy_pass http://app-carousel:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ruta por defecto
    location / {
        return 404 "Ruta no encontrada. Usa /pokemon/ o /carousel/";
    }
}